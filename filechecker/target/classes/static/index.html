<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHA-256 File Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>SHA-256 File Checker</h1>
<input type="file" id="fileInput"><br><br>
<textarea id="result" rows="4" cols="50" readonly></textarea><br><br>
<input type="text" id="hashInput" rows="2" cols="50" placeholder="Enter original hash"><br><br>
<button id="hashBtn">Generate Hash</button>
<br>
<button id="compareBtn">Compare Hash</button>

<script src="script.js"></script>
</body>
</html>
